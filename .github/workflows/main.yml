name: ESLint and Prettier

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: rs-tandem-app/package-lock.json

      - name: Set dependencies
        working-directory: rs-tandem-app
        run: npm ci

      - name: Check format Prettier
        working-directory: rs-tandem-app
        run: npx prettier --write .
          
  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 
          cache-dependency-path: rs-tandem-app/package-lock.json

      - name: NPM CI
        working-directory: rs-tandem-app
        run: npm ci

      - name: Run ESLint
        working-directory: rs-tandem-app
        run: npm run lint
